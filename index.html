<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXL | Dashboard</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { padding: 15px; width: 300px; border-radius: 5px; border: none; outline: none; }
        button { padding: 15px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>POTASSIUM_V3</h1>
    <form id="proxy-form">
        <input type="text" id="url-input" placeholder="Search Google or type a URL">
        <button type="submit">Go</button>
    </form>

    <script>
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('url-input');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Register the "Engine" (Service Worker)
            await navigator.serviceWorker.register('./sw.js', {
                scope: '/service/'
            });

            // 2. Format the URL
            let url = input.value.trim();
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            // 3. Encrypt and Redirect
            // Using simple XOR-style base64 to match UV config
            window.location.href = '/service/' + btoa(url);
        });
    </script>
</body>
</html>
