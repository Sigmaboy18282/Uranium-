<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXL | Dashboard</title>
    <style>
        :root {
            --primary: #007bff;
            --glow: rgba(0, 123, 255, 0.4);
            --bg: #050505;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(180px);
            opacity: 0.1;
            z-index: -1;
        }

        .container { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.03); 
            padding: 60px 40px; 
            border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        h1 { 
            margin-bottom: 35px; 
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #ffffff, #777777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input { 
            padding: 18px 25px; 
            width: 320px; 
            border-radius: 14px; 
            border: 1px solid #222; 
            background: rgba(0,0,0,0.7); 
            color: white; 
            outline: none; 
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
        }

        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 25px var(--glow);
            width: 360px;
        }

        button { 
            padding: 18px 45px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 14px; 
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 25px;
            transition: all 0.3s ease;
        }

        button:hover { 
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.4);
        }

        #status {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>URANIUM_V3</h1>
        <form id="proxy-form">
            <input type="text" id="url-input" placeholder="SEARCH OR TYPE URL" autocomplete="off">
            <br>
            <button type="submit">Launch Proxy</button>
        </form>
        <div id="status">Engine Ready</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.10/dist/uv.bundle.js"></script>
    <script src="/Uranium-/uv/uv.config.js"></script>

    <script>
        const form = document.getElementById('proxy-form');
        const input = document.getElementById('url-input');
        const status = document.getElementById('status');

        // AUTO-RECOVERY: If we are on a service path, force the engine to wake up
        window.addEventListener('load', async () => {
            if (location.pathname.includes('/service/')) {
                status.textContent = "Resuming Session...";
                try {
                    await navigator.serviceWorker.register('/Uranium-/sw.js', {
                        scope: '/Uranium-/service/'
                    });
                    // If the page is still showing our UI instead of the site, reload once
                    if (document.querySelector('h1').innerText === "URANIUM_V3") {
                        location.reload();
                    }
                } catch (e) {
                    console.error(e);
                }
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            status.textContent = "Booting Engine...";

            let url = input.value.trim();
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            try {
                // Register the worker
                await navigator.serviceWorker.register('/Uranium-/sw.js', {
                    scope: '/Uranium-/service/'
                });

                status.textContent = "Redirecting...";
                // Use Base64 encoding for the URL
                window.location.href = "/Uranium-/service/" + btoa(url);
                
            } catch (err) {
                status.style.color = "red";
                status.textContent = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
